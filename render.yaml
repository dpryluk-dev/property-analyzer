databases:
  - name: property-analyzer-db
    plan: free
    databaseName: property_analyzer

services:
  - type: web
    name: property-analyzer
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: property-analyzer-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
